name: Validate Git Aliases

on:
  push:
    branches:
      - "master"
    paths:
      - "git_aliases.sh"
      - ".github/workflows/aliases.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Git Aliases
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore GitPrompt.slnx --nologo

      - name: Build
        run: dotnet build GitPrompt.slnx --configuration Release --no-restore --nologo

      - name: Test
        run: dotnet test GitPrompt.slnx --configuration Release --no-build --nologo

  release:
    name: Upload to Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload aliases to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title "Git Aliases" --notes "Latest git aliases, auto-updated on push to master."
          fi
          gh release upload latest git_aliases.sh --clobber
