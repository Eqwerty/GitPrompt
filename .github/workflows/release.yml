name: Release

on:
  workflow_call:

# Only one release workflow runs at a time. If a new push arrives while a
# release is in progress, the in-progress run is cancelled so the latest
# commit always wins and assets never race against each other.
concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish Artifacts
    needs: build
    uses: ./.github/workflows/publish.yml

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gitprompt-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi
          gh release create latest \
            --title "Latest" \
            --target "${{ github.sha }}" \
            --generate-notes \
            artifacts/*